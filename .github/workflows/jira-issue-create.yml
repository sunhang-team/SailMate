name: 'Jira Issue Create on GitHub Issue Opened'

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}

      - name: Convert Markdown to Jira Syntax
        uses: peter-evans/jira2md@v1
        id: md2jira
        with:
          input-text: |
            ### GitHub Issue Link
            - ${{ github.event.issue.html_url }}

            ${{ github.event.issue.body }}
          mode: md2jira

      - name: Parse Epic Key
        id: parse-epic
        shell: bash
        run: |
          EPIC_KEY_RAW=$(echo "${{ github.event.issue.body }}" | grep -A2 '상위 작업' | grep -oE 'SM-[0-9]+' || true)
          if [ -z "$EPIC_KEY_RAW" ]; then
            echo "HAS_EPIC=false" >> $GITHUB_ENV
          else
            echo "HAS_EPIC=true" >> $GITHUB_ENV
            echo "EPIC_KEY=$EPIC_KEY_RAW" >> $GITHUB_ENV
          fi

      - name: Create Jira Issue
        id: create
        uses: atlassian/gajira-create@v3
        with:
          project: SM
          issuetype: Task
          summary: '${{ github.event.issue.title }}'
          description: '${{ steps.md2jira.outputs.output-text }}'
          fields: '{}'

      - name: Link to Parent Epic
        if: env.HAS_EPIC == 'true'
        shell: bash
        run: |
          AUTH=$(echo -n "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" | base64)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "{\"fields\":{\"parent\":{\"key\":\"${{ env.EPIC_KEY }}\"}}}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.create.outputs.issue }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Failed to link parent epic. HTTP $HTTP_CODE: $BODY"
            exit 1
          fi

      - name: Update GitHub Issue Title with Jira Ticket Number
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'update-issue'
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '[${{ steps.create.outputs.issue }}] ${{ github.event.issue.title }}'
