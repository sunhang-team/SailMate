name: '🎨 UI/스타일'
description: 'UI 또는 디자인을 변경합니다.'
labels: [style]
title: '이슈 이름을 작성해주세요'
body:
  - type: input
    id: epicKey
    attributes:
      label: '🎟️ 상위 작업 (에픽 키)'
      description: '이미 존재하는 에픽에 하위 태스크로 연결하고 싶다면 에픽 키(예: EP-1)를 입력하세요. 미입력 시 독립적인 태스크를 만듭니다.'
      placeholder: 'EP-1'
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: '📝 설명'
      description: '변경할 UI/스타일 내용을 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: '📋 작업 목록'
      description: '필요한 세부 작업을 작성해주세요.'
      value: |
        - [ ]
    validations:
      required: false
  - type: textarea
    id: reference
    attributes:
      label: '🔗 참고 사항'
      description: '디자인 시안, 스크린샷 등을 첨부해주세요.'
    validations:
      required: false
