name: '♻️ 리팩토링'
description: '기존 코드를 개선합니다.'
labels: [refactor]
title: '이슈 이름을 작성해주세요'
body:
  - type: input
    id: epicKey
    attributes:
      label: '🎟️ 상위 작업 (에픽 키)'
      description: '이미 존재하는 에픽에 하위 태스크로 연결하고 싶다면 에픽 키(예: EP-1)를 입력하세요. 미입력 시 독립적인 태스크를 만듭니다.'
      placeholder: 'EP-1'
    validations:
      required: false
  - type: textarea
    id: current
    attributes:
      label: '🚨 현재 문제'
      description: '현재 코드의 어떤 부분이 문제인지 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: '💡 개선 방향'
      description: '어떻게 개선할 것인지 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: '📋 작업 목록'
      description: '리팩토링에 필요한 세부 작업을 작성해주세요.'
      value: |
        - [ ]
    validations:
      required: false
