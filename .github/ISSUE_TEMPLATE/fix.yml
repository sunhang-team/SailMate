name: '🐛 버그 수정'
description: '버그를 제보하고 수정합니다.'
labels: [fix]
title: '이슈 이름을 작성해주세요'
body:
  - type: input
    id: epicKey
    attributes:
      label: '🎟️ 상위 작업 (에픽 키)'
      description: '이미 존재하는 에픽에 하위 태스크로 연결하고 싶다면 에픽 키(예: EP-1)를 입력하세요. 미입력 시 독립적인 태스크를 만듭니다.'
      placeholder: 'EP-1'
    validations:
      required: false
  - type: textarea
    id: current
    attributes:
      label: '🚨 현재 동작'
      description: '현재 어떤 문제가 발생하는지 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: '✅ 기대 동작'
      description: '정상적으로 동작해야 하는 모습을 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: '🔄 재현 방법'
      description: '버그를 재현하는 단계를 작성해주세요.'
      value: |
        1.
        2.
        3.
    validations:
      required: false
  - type: textarea
    id: reference
    attributes:
      label: '🔗 참고 사항'
      description: '스크린샷, 에러 로그 등을 첨부해주세요.'
    validations:
      required: false
